name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "💥 Breaking changes"
    labels:
      - "breaking"
  - title: "🚀 Features"
    labels:
      - "feature"
  - title: "🐛 Fixes"
    labels:
      - "fix"
      - "bug"
  - title: "⚡ Performance"
    labels:
      - "perf"
  - title: "📝 Documentation"
    labels:
      - "docs"
  - title: "🧪 Tests"
    labels:
      - "test"
  - title: "🧹 Chores"
    labels:
      - "chore"

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - "breaking"
  minor:
    labels:
      - "feature"
  patch:
    labels:
      - "fix"
      - "bug"
      - "perf"
      - "docs"
      - "test"
      - "chore"
  default: patch

template: |
  ## What's changed

  $CHANGES

  ## Migration

  If this release contains breaking changes, see the entries under "💥 Breaking changes" above. Each linked PR includes migration guidance.

  ## Compatibility

  - Unity 2022 LTS: tested
  - Unity 6: tested

  ## Install

  ```
  "com.revcore.<module>": "https://github.com/hnb-rabear/rcore.git?path=Assets/RevCore/<Module>#v$RESOLVED_VERSION"
  ```

  **Full changelog**: https://github.com/hnb-rabear/rcore/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

autolabeler:
  - label: "breaking"
    title:
      - "/^.+!:/i"
      - "/BREAKING CHANGE/i"
  - label: "feature"
    title:
      - "/^feat(\\(.+\\))?:/i"
  - label: "fix"
    title:
      - "/^fix(\\(.+\\))?:/i"
  - label: "perf"
    title:
      - "/^perf(\\(.+\\))?:/i"
  - label: "docs"
    title:
      - "/^docs(\\(.+\\))?:/i"
  - label: "chore"
    title:
      - "/^chore(\\(.+\\))?:/i"
      - "/^build(\\(.+\\))?:/i"
      - "/^ci(\\(.+\\))?:/i"
  - label: "test"
    title:
      - "/^test(\\(.+\\))?:/i"
