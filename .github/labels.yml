# Labels managed by .github/workflows/labels.yml (github/labeler-action or manual).
# Keep this file the source of truth; edit here, not in the UI.

- name: breaking
  color: "B60205"
  description: Public API removal, rename, or behavior change

- name: feature
  color: "0E8A16"
  description: Additive new functionality

- name: fix
  color: "FBCA04"
  description: Bug fix

- name: bug
  color: "D93F0B"
  description: Reported bug (issues)

- name: perf
  color: "1D76DB"
  description: Performance improvement

- name: docs
  color: "5319E7"
  description: Documentation only

- name: test
  color: "BFD4F2"
  description: Tests only

- name: chore
  color: "C5DEF5"
  description: Build, CI, internal refactor

- name: question
  color: "CC317C"
  description: Discussion or how-to

- name: needs-triage
  color: "EDEDED"
  description: Maintainer has not yet looked at this

- name: release-blocker
  color: "000000"
  description: Must be resolved before next release

- name: good-first-issue
  color: "7057FF"
  description: Good entry point for a new contributor

- name: module:audio
  color: "E99695"
  description: Audio module
