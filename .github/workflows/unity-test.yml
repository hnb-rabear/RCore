name: Unity Tests

# Manual trigger only until Unity license secrets are configured. The auto
# triggers (pull_request, push to main) are commented out so PRs don't show a
# red X on every run. Restore them after UNITY_LICENSE / UNITY_EMAIL /
# UNITY_PASSWORD are set per docs/contributing/CI_SETUP.md.
on:
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "Assets/RevCore/**"
  #     - "Packages/**"
  #     - "ProjectSettings/**"
  #     - ".github/workflows/unity-test.yml"
  # push:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.unityVersion }} - ${{ matrix.testMode }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        unityVersion:
          - "2022.3.40f1"  # Unity 2022 LTS
          - "6000.0.23f1"  # Unity 6
        testMode:
          - editmode
          - playmode

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.unityVersion }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.unityVersion }}-

      - name: Run Unity tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: ${{ matrix.unityVersion }}
          testMode: ${{ matrix.testMode }}
          artifactsPath: TestResults-${{ matrix.unityVersion }}-${{ matrix.testMode }}
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+RevCore.*,-RevCore.*.Tests,-RevCore.*.Editor"
          customParameters: "-debugCodeOptimization"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults-${{ matrix.unityVersion }}-${{ matrix.testMode }}
          path: TestResults-${{ matrix.unityVersion }}-${{ matrix.testMode }}

      - name: Upload coverage report
        if: matrix.testMode == 'editmode'
        uses: actions/upload-artifact@v4
        with:
          name: Coverage-${{ matrix.unityVersion }}
          path: CodeCoverage
