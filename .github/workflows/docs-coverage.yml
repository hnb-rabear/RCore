name: Docs Coverage

on:
  pull_request:
    branches: [main]
    paths:
      - "Assets/RevCore/**/*.cs"
      - ".github/workflows/docs-coverage.yml"
      - "scripts/check-xmldoc-coverage.py"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  xmldoc:
    name: Public XML doc coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run XML doc coverage check
        run: python3 scripts/check-xmldoc-coverage.py --root Assets/RevCore --min-coverage 100 --baseline scripts/xmldoc-baseline.json
